    <script type="text/plain" id="lyrics">

לאון השען דפק בדלת
בקצב של מטוטלת ישנה
עמד שם עם תיק ישן
עם ריח של שמן וחלודה
"אתה זה בועז?" הוא שאל
"באתי לעזור לך."

הוא הניח בד שחור על השולחן
הקשיב לחריקות במנגנון
הוציא זכוכית מגדלת
והתחיל לפרק לאט לאט את השעון
לחפש איזה גלגל שיניים שנתקע
בתוך החרדה והשיגעון.

דפנה אישתך אמרה
שהמחר שלך הפך להפרעה
זה מלכלך לה את השקט
הוא הביט בי, הוא הביט בה וקבע
לעצור הכל, את המחר שלא מפסיק לשרוף כמו האש
לאון מנסה לגרום לי להביט רק במה שיש.

תחזיק לי את הבורג, הוא אומר
זה הבורג של יום חמישי
האצבעות שלו נוגעות בברזל החי
במנגנון חבוי אישי
תוריד קצת מהלחץ
זה שוב העומס הנפשי
קצת שמן על הקפיץ
והוא נדרך מייד להיות סוף סוף חופשי.

הוא השאיר לי בורג מיותר
מתנה של שחרור והקלה
ויצא בשקט לדרכו
השאיר אותי עם מחשבה
לא הכל חייב להיות סגור ומדוייק
כדי לפעום
מצאנו את התדר
שפועם בקצב הנכון.

    </script>
